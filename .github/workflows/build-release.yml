name: Build and release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install project
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[gui,dev]"

      - name: Run tests
        shell: pwsh
        run: python -m pytest -q

      - name: Build Windows executables
        shell: pwsh
        run: .\build_exe.ps1

      - name: Package ZIP and checksum
        id: package
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag") {
            "${{ github.ref_name }}"
          } else {
            "dev-${{ github.run_number }}"
          }
          $archive = Join-Path $PWD "DVD-FieldFix-$version-windows-x64.zip"
          $checksum = "$archive.sha256"
          Compress-Archive -Path ".\dist\DVD-FieldFix\*" -DestinationPath $archive -CompressionLevel Optimal
          $hash = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $([IO.Path]::GetFileName($archive))" | Set-Content -LiteralPath $checksum -Encoding ascii
          "archive=$archive" >> $env:GITHUB_OUTPUT
          "checksum=$checksum" >> $env:GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: DVD-FieldFix-Windows-${{ github.run_number }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "${{ steps.package.outputs.archive }}" `
            "${{ steps.package.outputs.checksum }}" `
            --verify-tag `
            --title "DVD FieldFix ${{ github.ref_name }}" `
            --generate-notes
